<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿠키정책 - CineWorld</title>
    <link rel="stylesheet" href="/front-end/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0a0f1a !important; }
        .legal-page { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }
        .legal-page h1 { font-size: 2rem; margin-bottom: 30px; color: #e63946; border-bottom: 2px solid #e63946; padding-bottom: 15px; }
        .legal-page h2 { font-size: 1.3rem; margin: 30px 0 15px; color: #e63946; }
        .legal-page p, .legal-page li { line-height: 1.8; margin-bottom: 15px; color: #a8b2c1; }
        .legal-page ul { padding-left: 20px; }
        .legal-page a { color: #e63946; text-decoration: none; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px; color: #e63946; text-decoration: none; font-weight: 500; }
        .back-link:hover { color: #ff6b6b; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo-area" style="text-decoration: none; cursor: pointer;">
                <div class="logo-box">
                    <i class="fas fa-play"></i>
                </div>
                <div>
                    <div class="logo-text">CINEWORLD</div>
                    <span class="logo-sub">영화 가이드</span>
                </div>
            </a>
            
            <select id="langSelectSubpage" style="background: #151f2e; color: white; border: 1px solid rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 6px; cursor: pointer;">
                <option value="pt-BR">Português</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="zh-CN">中文</option>
                <option value="ja">日本語</option>
                <option value="ru">Русский</option>
                <option value="ko">한국어</option>
            </select>
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const select = document.getElementById('langSelectSubpage');
                    const savedLang = localStorage.getItem('cineworld_language') || 'ko';
                    select.value = savedLang;
                    select.addEventListener('change', function() {
                        localStorage.setItem('cineworld_language', this.value);
                        localStorage.setItem('cineworld_lang', this.value);
                        const langCode = this.value === 'pt-BR' ? '' : '/' + this.value.split('-')[0];
                        window.location.href = langCode + '/cookies';
                    });
                });
            </script>
        </div>
    </header>
    <div class="legal-page">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> 홈으로 돌아가기</a>
        <h1><i class="fas fa-cookie-bite"></i> 쿠키정책</h1>
        <p>쿠키는 웹사이트를 방문할 때 장치에 저장되는 작은 텍스트 파일입니다.</p>
        <h2><i class="fas fa-list"></i> 사용하는 쿠키 유형</h2>
        <ul>
            <li><strong>필수 쿠키:</strong> 사이트가 제대로 작동하기 위해 필요합니다</li>
            <li><strong>분석 쿠키:</strong> Google Analytics로 사이트 사용情况的 이해</li>
            <li><strong>기능 쿠키:</strong>設定を記憶するため</li>
        </ul>
        <h2><i class="fas fa-cog"></i> 쿠키 관리</h2>
        <p>브라우저 설정을 통해 언제든지 쿠키 설정을 변경할 수 있습니다.</p>
        <h2><i class="fas fa-clock"></i> 보관 기간</h2>
        <p>쿠키는 유효 기간이 다양합니다. 분석 쿠키는 최대 14개월 동안 보관됩니다.</p>
        <p style="margin-top: 30px;"><em>최종 업데이트: 2026</em></p>
    </div>
</body>
</html>
