<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookieポリシー - CineWorld</title>
<link rel="stylesheet" href="/front-end/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg-dark) !important; }
        .legal-page { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }
        .legal-page h1 { font-size: 2rem; margin-bottom: 30px; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
        .legal-page h2 { font-size: 1.3rem; margin: 30px 0 15px; color: var(--accent); }
        .legal-page p, .legal-page li { line-height: 1.8; margin-bottom: 15px; color: var(--text-light); }
        .legal-page a { color: var(--accent); text-decoration: none; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px; color: var(--accent); text-decoration: none; font-weight: 500; }
        .back-link:hover { color: var(--primary-light); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="/" class="logo-area" style="text-decoration: none; cursor: pointer;">
                <div class="logo-box">
                    <i class="fas fa-play"></i>
                </div>
                <div>
                    <div class="logo-text">CINEWORLD</div>
                    <span class="logo-sub">あなたの映画ガイド</span>
                </div>
            </a>
            
            <select id="langSelectSubpage" style="background: #151f2e; color: white; border: 1px solid rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 6px; cursor: pointer;">
                <option value="pt-BR">Português</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="zh-CN">中文</option>
                <option value="ja">日本語</option>
                <option value="ru">Русский</option>
                <option value="ko">한국어</option>
            </select>
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    const select = document.getElementById('langSelectSubpage');
                    const savedLang = localStorage.getItem('cineworld_language') || 'ja';
                    select.value = savedLang;
                    select.addEventListener('change', function() {
                        localStorage.setItem('cineworld_language', this.value);
                        localStorage.setItem('cineworld_lang', this.value);
                        const langCode = this.value === 'pt-BR' ? '' : '/' + this.value.split('-')[0];
                        window.location.href = langCode + '/cookies';
                    });
                });
            </script>
        </div>
    </header>
    <div class="legal-page">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> ホームに戻る</a>
        <h1><i class="fas fa-cookie-bite"></i> Cookieポリシー</h1>
        <p>Cookieは、Webサイトを訪問したときにデバイスに保存される小さなテキストファイルです。</p>
        <h2><i class="fas fa-list"></i> 使用するCookieの種類</h2>
        <ul>
            <li><strong>必須Cookie：</strong>サイトの正常な動作に必要です</li>
            <li><strong>分析Cookie：</strong>Google Analyticsでサイトの使用状況を理解するため</li>
            <li><strong>機能Cookie：</strong>設定を記憶するため</li>
        </ul>
        <h2><i class="fas fa-cog"></i> Cookieの管理</h2>
        <p>ブラウザの設定からいつでもCookieの偏好を変更できます。</p>
        <h2><i class="fas fa-clock"></i> 保持期間</h2>
        <p>Cookieには有効です。分析Cookieは最大14ヶ月保持されます。</p>
        <p style="margin-top: 30px;"><em>最終更新：2026</em></p>
    </div>
</body>
</html>
