name = "cineworld-api"
type = "javascript"
compatibility_date = "2024-01-01"

[env.production]
name = "cineworld-api-prod"
routes = [
  { pattern = "cineworld.pages.dev/api/*" }
]

[vars]
TMDB_API_KEY = "your_tmdb_api_key_here"

[env.development]
name = "cineworld-api-dev"
vars.TMDB_API_KEY = "your_tmdb_api_key_here"
